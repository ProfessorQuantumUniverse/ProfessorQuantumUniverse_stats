# ─────────────────────────────────────────────────────────────────────────────
# GitHub Metrics — Comprehensive workflow using lowlighter/metrics
# Generates SVG metric cards for every available plugin and commits them.
# See https://github.com/lowlighter/metrics for full documentation.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   METRICS_TOKEN   – Fine-grained PAT with read:user, repo, read:org scopes
# Optional secrets (enable the matching plugin by uncommenting its step):
#   WAKATIME_API_KEY        – WakaTime API key
#   SPOTIFY_CLIENT_ID       – Spotify client ID (music plugin)
#   SPOTIFY_CLIENT_SECRET   – Spotify client secret (music plugin)
#   SPOTIFY_REFRESH_TOKEN   – Spotify refresh token (music plugin)
#   STEAM_API_KEY           – Steam Web API key (steam plugin)
#   STEAM_USER_ID           – Steam 64-bit user ID (steam plugin)
#   LEETCODE_SESSION        – LeetCode session cookie (leetcode plugin)
#   PAGESPEED_API_KEY       – Google PageSpeed API key
# ─────────────────────────────────────────────────────────────────────────────

name: 📊 GitHub Metrics

on:
  # Run every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Run on every push to main so the README always reflects the latest state
  push:
    branches:
      - main

concurrency:
  group: metrics
  cancel-in-progress: false

# Minimal permissions required: write access to commit generated SVGs
permissions:
  contents: write
  actions: read

jobs:

  # ───────────────────────────────────────────────────
  # 1. Classic profile overview (base plugin)
  # ───────────────────────────────────────────────────
  classic:
    name: Classic overview
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.classic.svg
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_timezone: UTC

  # ───────────────────────────────────────────────────
  # 2. Isometric commit calendar
  # ───────────────────────────────────────────────────
  isocalendar:
    name: Isometric calendar
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

  # ───────────────────────────────────────────────────
  # 3. Languages activity
  # ───────────────────────────────────────────────────
  languages:
    name: Languages
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, shell
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage

  # ───────────────────────────────────────────────────
  # 4. Stargazers
  # ───────────────────────────────────────────────────
  stargazers:
    name: Stargazers
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.stargazers.svg
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_days: 14
          plugin_stargazers_worldmap: yes

  # ───────────────────────────────────────────────────
  # 5. Lines of code changed
  # ───────────────────────────────────────────────────
  lines:
    name: Lines of code
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.lines.svg
          base: repositories
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_branches: main, master
          plugin_lines_sections: base

  # ───────────────────────────────────────────────────
  # 6. Starred topics
  # ───────────────────────────────────────────────────
  topics:
    name: Topics
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.topics.svg
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: starred
          plugin_topics_sort: stars

  # ───────────────────────────────────────────────────
  # 7. Recently starred repositories
  # ───────────────────────────────────────────────────
  stars:
    name: Recently starred
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.stars.svg
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 4

  # ───────────────────────────────────────────────────
  # 8. Repository licenses
  # ───────────────────────────────────────────────────
  licenses:
    name: Licenses
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.licenses.svg
          base: ""
          template: repository
          repo: ProfessorQuantumUniverse_stats
          plugin_licenses: yes
          plugin_licenses_setup: pip install
          plugin_licenses_ratio: yes
          plugin_licenses_legal: yes

  # ───────────────────────────────────────────────────
  # 9. Coding habits and activity
  # ───────────────────────────────────────────────────
  habits:
    name: Coding habits
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.habits.svg
          base: ""
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

  # ───────────────────────────────────────────────────
  # 10. Repository contributors
  # ───────────────────────────────────────────────────
  contributors:
    name: Contributors
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.contributors.svg
          base: ""
          template: repository
          repo: ProfessorQuantumUniverse_stats
          plugin_contributors: yes
          plugin_contributors_contributions: yes
          plugin_contributors_head: main
          plugin_contributors_ignored: github-actions[bot], dependabot[bot]
          plugin_contributors_sections: contributors

  # ───────────────────────────────────────────────────
  # 11. Follow-up of issues and pull requests
  # ───────────────────────────────────────────────────
  followup:
    name: Follow-up issues & PRs
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.followup.svg
          base: ""
          plugin_followup: yes
          plugin_followup_archived: yes
          plugin_followup_display: issues
          plugin_followup_indepth: yes
          plugin_followup_sections: user

  # ───────────────────────────────────────────────────
  # 12. Comment reactions
  # ───────────────────────────────────────────────────
  reactions:
    name: Comment reactions
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.reactions.svg
          base: ""
          plugin_reactions: yes
          plugin_reactions_display: absolute
          plugin_reactions_limit: 200
          plugin_reactions_limit_discussions: 100
          plugin_reactions_limit_discussions_comments: 100
          plugin_reactions_limit_issues: 100

  # ───────────────────────────────────────────────────
  # 13. People (followers / following)
  # ───────────────────────────────────────────────────
  people:
    name: People
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.people.svg
          base: ""
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 28
          plugin_people_types: followers, following
          plugin_people_identicons: no
          plugin_people_shuffle: yes

  # ───────────────────────────────────────────────────
  # 14. GitHub Sponsorships
  # ───────────────────────────────────────────────────
  sponsorships:
    name: Sponsorships
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.sponsorships.svg
          base: ""
          plugin_sponsorships: yes
          plugin_sponsorships_sections: amount, sponsors
          plugin_sponsorships_size: 24

  # ───────────────────────────────────────────────────
  # 15. GitHub Sponsors
  # ───────────────────────────────────────────────────
  sponsors:
    name: Sponsors
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.sponsors.svg
          base: ""
          plugin_sponsors: yes
          plugin_sponsors_past: no
          plugin_sponsors_sections: goal, list, about
          plugin_sponsors_size: 24

  # ───────────────────────────────────────────────────
  # 16. Featured repositories
  # ───────────────────────────────────────────────────
  repositories:
    name: Featured repositories
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.repositories.svg
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: ProfessorQuantumUniverse/ProfessorQuantumUniverse_stats
          plugin_repositories_order: featured, pinned, starred, random

  # ───────────────────────────────────────────────────
  # 17. Discussions
  # ───────────────────────────────────────────────────
  discussions:
    name: Discussions
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.discussions.svg
          base: ""
          plugin_discussions: yes
          plugin_discussions_categories: yes
          plugin_discussions_categories_limit: 8

  # ───────────────────────────────────────────────────
  # 18. Star lists
  # ───────────────────────────────────────────────────
  starlists:
    name: Star lists
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.starlists.svg
          base: ""
          plugin_starlists: yes
          plugin_starlists_limit: 2
          plugin_starlists_limit_languages: 8
          plugin_starlists_limit_repositories: 2
          plugin_starlists_languages: yes

  # ───────────────────────────────────────────────────
  # 19. Commit calendar (full history)
  # ───────────────────────────────────────────────────
  calendar:
    name: Commit calendar
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.calendar.svg
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 0

  # ───────────────────────────────────────────────────
  # 20. Achievements
  # ───────────────────────────────────────────────────
  achievements:
    name: Achievements
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0

  # ───────────────────────────────────────────────────
  # 21. Notable contributions
  # ───────────────────────────────────────────────────
  notable:
    name: Notable contributions
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.notable.svg
          base: ""
          plugin_notable: yes
          plugin_notable_filter: stars:>500
          plugin_notable_from: all
          plugin_notable_indepth: yes
          plugin_notable_repositories: yes
          plugin_notable_self: no
          plugin_notable_skipped: ""
          plugin_notable_types: commit

  # ───────────────────────────────────────────────────
  # 22. Recent activity
  # ───────────────────────────────────────────────────
  activity:
    name: Recent activity
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.activity.svg
          base: ""
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_ignored: github-actions[bot], dependabot[bot]
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_timestamps: no
          plugin_activity_visibility: all

  # ───────────────────────────────────────────────────
  # 23. Repositories traffic
  # ───────────────────────────────────────────────────
  traffic:
    name: Traffic
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.traffic.svg
          base: repositories
          plugin_traffic: yes

  # ───────────────────────────────────────────────────
  # 24. Random code snippet
  # ───────────────────────────────────────────────────
  code:
    name: Random code snippet
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.code.svg
          base: ""
          plugin_code: yes
          plugin_code_days: 3
          plugin_code_lines: 12
          plugin_code_load: 400
          plugin_code_visibility: public
          plugin_code_languages: python, javascript, typescript, go, rust

  # ───────────────────────────────────────────────────
  # 25. Gists
  # ───────────────────────────────────────────────────
  gists:
    name: Gists
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.gists.svg
          base: ""
          plugin_gists: yes

  # ───────────────────────────────────────────────────
  # 26. GitHub Projects
  # ───────────────────────────────────────────────────
  projects:
    name: GitHub Projects
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.projects.svg
          base: ""
          plugin_projects: yes
          plugin_projects_descriptions: yes
          plugin_projects_limit: 4

  # ───────────────────────────────────────────────────
  # 27. Introduction
  # ───────────────────────────────────────────────────
  introduction:
    name: Introduction
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.introduction.svg
          base: header
          plugin_introduction: yes
          plugin_introduction_title: yes

  # ───────────────────────────────────────────────────
  # 28. GitHub Skyline
  # ───────────────────────────────────────────────────
  skyline:
    name: GitHub Skyline
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.skyline.svg
          base: ""
          plugin_skyline: yes
          plugin_skyline_year: current-year
          plugin_skyline_frames: 6
          plugin_skyline_quality: 0.5
          plugin_skyline_settings: '{"url":"https://skyline.github.com/${login}/${year}","ready":".coverage-chart","wait":4,"hide":"header, footer, a"}'

  # ───────────────────────────────────────────────────
  # 29. Google PageSpeed
  # Requires: PAGESPEED_API_KEY secret (optional but recommended)
  # ───────────────────────────────────────────────────
  pagespeed:
    name: Google PageSpeed
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.pagespeed.svg
          base: ""
          plugin_pagespeed: yes
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_API_KEY }}
          plugin_pagespeed_url: https://github.com/ProfessorQuantumUniverse
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_screenshot: yes

  # ───────────────────────────────────────────────────
  # 30. Stack Overflow
  # ───────────────────────────────────────────────────
  stackoverflow:
    name: Stack Overflow
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.stackoverflow.svg
          base: ""
          plugin_stackoverflow: yes
          plugin_stackoverflow_sections: answers-top, questions-recent
          plugin_stackoverflow_limit: 2
          plugin_stackoverflow_user: 0

  # ───────────────────────────────────────────────────
  # 31. Anilist watch list and reading list
  # ───────────────────────────────────────────────────
  anilist:
    name: Anilist
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.anilist.svg
          base: ""
          plugin_anilist: yes
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites, watching, reading
          plugin_anilist_limit: 2
          plugin_anilist_limit_characters: 22
          plugin_anilist_shuffle: yes
          plugin_anilist_user: .user.login

  # ───────────────────────────────────────────────────
  # 32. Music activity and suggestions
  # Requires Spotify or Last.fm secrets
  # ───────────────────────────────────────────────────
  music:
    name: Music
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.music.svg
          base: ""
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_token: "${{ secrets.SPOTIFY_CLIENT_ID }}, ${{ secrets.SPOTIFY_CLIENT_SECRET }}, ${{ secrets.SPOTIFY_REFRESH_TOKEN }}"
          plugin_music_mode: recent
          plugin_music_limit: 4
          plugin_music_played_at: yes
          plugin_music_time_range: short
          plugin_music_top_type: tracks

  # ───────────────────────────────────────────────────
  # 33. Recent posts (dev.to)
  # ───────────────────────────────────────────────────
  posts:
    name: Recent posts
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.posts.svg
          base: ""
          plugin_posts: yes
          plugin_posts_source: dev.to
          plugin_posts_user: .user.login
          plugin_posts_descriptions: yes
          plugin_posts_covers: yes
          plugin_posts_limit: 4

  # ───────────────────────────────────────────────────
  # 34. RSS feed
  # ───────────────────────────────────────────────────
  rss:
    name: RSS feed
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.rss.svg
          base: ""
          plugin_rss: yes
          plugin_rss_source: https://news.ycombinator.com/rss
          plugin_rss_limit: 4

  # ───────────────────────────────────────────────────
  # 35. WakaTime
  # Requires: WAKATIME_API_KEY secret
  # ───────────────────────────────────────────────────
  wakatime:
    name: WakaTime
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.wakatime.svg
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 7
          plugin_wakatime_limit: 5
          plugin_wakatime_languages_other: yes
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          plugin_wakatime_url: https://wakatime.com
          plugin_wakatime_user: current

  # ───────────────────────────────────────────────────
  # 36. LeetCode
  # ───────────────────────────────────────────────────
  leetcode:
    name: LeetCode
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.leetcode.svg
          base: ""
          plugin_leetcode: yes
          plugin_leetcode_user: .user.login
          plugin_leetcode_sections: solved, skills, recent
          plugin_leetcode_limit_skills: 10
          plugin_leetcode_limit_recent: 2

  # ───────────────────────────────────────────────────
  # 37. Steam
  # Requires: STEAM_API_KEY and STEAM_USER_ID secrets
  # ───────────────────────────────────────────────────
  steam:
    name: Steam
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.steam.svg
          base: ""
          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_API_KEY }}
          plugin_steam_user: ${{ secrets.STEAM_USER_ID }}
          plugin_steam_sections: player, most-played, recently-played
          plugin_steam_achievements_limit: 2
          plugin_steam_games_limit: 1
          plugin_steam_playtime_threshold: 2
          plugin_steam_recent_games_limit: 1

  # ───────────────────────────────────────────────────
  # 38. 16Personalities (community plugin)
  # ───────────────────────────────────────────────────
  sixteen_personalities:
    name: 16Personalities
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.16personalities.svg
          base: ""
          plugin_16personalities: yes
          plugin_16personalities_url: https://www.16personalities.com/profiles/enfj-a
          plugin_16personalities_sections: personality, traits
          plugin_16personalities_scores: yes

  # ───────────────────────────────────────────────────
  # 39. Chess (community plugin)
  # ───────────────────────────────────────────────────
  chess:
    name: Chess
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.chess.svg
          base: ""
          plugin_chess: yes
          plugin_chess_token: ${{ secrets.CHESS_TOKEN }}
          plugin_chess_user: .user.login
          plugin_chess_platform: chess.com

  # ───────────────────────────────────────────────────
  # 40. Fortune (community plugin)
  # ───────────────────────────────────────────────────
  fortune:
    name: Fortune
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.fortune.svg
          base: ""
          plugin_fortune: yes

  # ───────────────────────────────────────────────────
  # 41. Screenshot (community plugin)
  # ───────────────────────────────────────────────────
  screenshot:
    name: Website screenshot
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.screenshot.svg
          base: ""
          plugin_screenshot: yes
          plugin_screenshot_title: My GitHub Profile
          plugin_screenshot_url: https://github.com/ProfessorQuantumUniverse
          plugin_screenshot_selector: main
          plugin_screenshot_viewport: '{"width":1440,"height":900}'

  # ───────────────────────────────────────────────────
  # 42. Splatoon (community plugin)
  # ───────────────────────────────────────────────────
  splatoon:
    name: Splatoon
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.splatoon.svg
          base: ""
          plugin_splatoon: yes
          plugin_splatoon_token: ${{ secrets.SPLATOON_TOKEN }}
          plugin_splatoon_sections: player, versus, salmon-run
          plugin_splatoon_versus_limit: 1
          plugin_splatoon_salmon_run_limit: 1
          plugin_splatoon_statink: no
          plugin_splatoon_statink_token: ${{ secrets.SPLATOON_STATINK_TOKEN }}

  # ───────────────────────────────────────────────────
  # 43. Stock prices (community plugin)
  # ───────────────────────────────────────────────────
  stock:
    name: Stock prices
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/metrics.stock.svg
          base: ""
          plugin_stock: yes
          plugin_stock_token: ${{ secrets.STOCK_TOKEN }}
          plugin_stock_symbol: TSLA
          plugin_stock_duration: 1d
          plugin_stock_interval: 5m
